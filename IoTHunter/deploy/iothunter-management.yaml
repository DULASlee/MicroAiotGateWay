---
apiVersion: v1
kind: Service
metadata:
  name: iothunter-management
  namespace: iothunter
spec:
  selector:
    app: iothunter-management
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iothunter-management
  namespace: iothunter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iothunter-management
  template:
    metadata:
      labels:
        app: iothunter-management
    spec:
      containers:
      - name: management
        image: iothunter-management:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: ASPNETCORE_URLS
          value: http://+:80
        - name: Kestrel__Endpoints__Http__Url
          value: http://+:80
        - name: Auth__DefaultAdminUsername
          value: "admin"
        - name: Auth__DefaultAdminPassword
          value: "admin123"
        - name: Auth__JwtSecret
          value: "aB3xK9mP2qR7tW5vY1zC4eF6hJ8lN0pQ3sU9wX2yZ5aB8cD1eF4gH7Z9iJ6kLmNo"
        - name: Auth__TokenExpirationHours
          value: "8"
        - name: IoTGateway__ConfigUrl
          value: "http://iot-gateway.iothunter.svc.cluster.local/api/v1/config"
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health/ready
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
