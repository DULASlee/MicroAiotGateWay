---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-gateway
  namespace: iothunter
  labels:
    app: iot-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iot-gateway
  template:
    metadata:
      labels:
        app: iot-gateway
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      volumes:
      - name: tmp
        emptyDir: {}
      - name: tls
        secret:
          secretName: gateway-tls
          optional: true
      containers:
      - name: gateway
        image: iot-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        - containerPort: 9464
          name: metrics
        env:
        - name: Kafka__BootstrapServers
          valueFrom:
            secretKeyRef:
              name: kafka-secret
              key: Kafka__BootstrapServers
        - name: Mqtt__TcpServer
          value: host.docker.internal
        - name: Mqtt__TcpPort
          value: "1883"
        - name: Mqtt__Username
          valueFrom:
            secretKeyRef:
              name: mqtt-credentials
              key: gateway-username
        - name: Mqtt__Password
          valueFrom:
            secretKeyRef:
              name: mqtt-credentials
              key: gateway-password
        - name: ASPNETCORE_URLS
          value: "http://+:80"
        - name: OpenTelemetry__OtlpEndpoint
          value: ""
        startupProbe:
          httpGet:
            path: /health/ready
            port: 80
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health/live
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 512Mi
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: tls
          mountPath: /app/certs
          readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: iot-gateway
  namespace: iothunter
  labels:
    app: iot-gateway
  annotations:
    prometheus.io/port: "9464"
    prometheus.io/scrape: "true"
spec:
  selector:
    app: iot-gateway
  ports:
  - port: 80
    targetPort: 80
    name: http
  - port: 9464
    targetPort: 9464
    name: metrics
