---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: iothunter
spec:
  selector:
    app: timescaledb
  ports:
  - port: 5432
    targetPort: 5432
    name: timescaledb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  namespace: iothunter
  labels:
    app: timescaledb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: timescaledb
        image: timescale/timescaledb:latest-pg16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: IoTHunterTS
        - name: POSTGRES_USER
          value: iotapp
        - name: POSTGRES_PASSWORD
          value: changeme
        startupProbe:
          tcpSocket:
            port: 5432
          failureThreshold: 12
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - iotapp
            - -d
            - IoTHunterTS
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - iotapp
            - -d
            - IoTHunterTS
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: tsdata
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: tsdata
        emptyDir: {}
