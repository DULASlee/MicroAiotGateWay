apiVersion: v1
kind: Service
metadata:
  name: iot-gateway
  namespace: iothunter
  labels:
    app: iot-gateway
  annotations:
    prometheus.io/port: "9464"
    prometheus.io/scrape: "true"
spec:
  selector:
    app: iot-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: metrics
      port: 9464
      targetPort: 9464
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-gateway
  namespace: iothunter
  labels:
    app: iot-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iot-gateway
  template:
    metadata:
      labels:
        app: iot-gateway
      annotations:
        prometheus.io/port: "9464"
        prometheus.io/scrape: "true"
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: iot-gateway
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        readOnlyRootFilesystem: true
      containers:
        - name: iot-gateway
          image: iot-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
            - containerPort: 9464
              name: metrics
          env:
            - name: Kafka__BootstrapServers
              valueFrom:
                secretKeyRef:
                  name: kafka-secret
                  key: Kafka__BootstrapServers
            - name: Mqtt__WebSocketUrl
              value: "ws://mosquitto:8083/mqtt"
            - name: ASPNETCORE_URLS
              value: "http://+:80"
            - name: OpenTelemetry__OtlpEndpoint
              value: "http://otel-collector.iothunter.svc:4317"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1.0"
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health/ready
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tls
              mountPath: /app/certs
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tls
          secret:
            secretName: gateway-tls
            optional: true
