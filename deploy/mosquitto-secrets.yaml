apiVersion: v1
kind: Secret
metadata:
  name: mosquitto-config
  namespace: iothunter
type: Opaque
stringData:
  mosquitto.conf: |
    persistence true
    persistence_location /mosquitto/data/

    listener 1883
    protocol mqtt

    listener 8083
    protocol websockets

    allow_anonymous false
    password_file /mosquitto/config/passwordfile
    acl_file /mosquitto/config/aclfile

    # TLS 预留（启用后取消注释）：
    # listener 8883
    # protocol mqtt
    # cafile /mosquitto/config/certs/ca.crt
    # certfile /mosquitto/config/certs/server.crt
    # keyfile /mosquitto/config/certs/server.key

  passwordfile: |
    iotgateway:$7$101$generated-hash-placeholder
    devicesim:$7$101$generated-hash-placeholder

  aclfile: |
    user iotgateway
    topic read $share/gateway-group/device/+/telemetry
    topic read $share/gateway-group/device/+/event/critical

    user devicesim
    topic write device/+/telemetry
    topic write device/+/event/critical
