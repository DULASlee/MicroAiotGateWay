apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: iothunter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.62
          ports:
            - containerPort: 16686
              name: query
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: SPAN_STORAGE_TYPE
              value: "memory"
            - name: MEMORY_MAX_TRACES
              value: "100000"
          # 修补：必须大于 Collector 的 memory_limiter (512Mi)，防止压测时 OOM Kill 导致 Trace 断流
          resources:
            limits:
              cpu: 1
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: iothunter
spec:
  selector:
    app: jaeger
  ports:
    - port: 16686
      targetPort: 16686
      name: query
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: iothunter
spec:
  selector:
    app: jaeger
  ports:
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
