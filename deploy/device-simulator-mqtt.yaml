apiVersion: v1
kind: Service
metadata:
  name: device-simulator-mqtt
  namespace: iothunter
  labels:
    app: device-simulator-mqtt
  annotations:
    prometheus.io/port: "9464"
    prometheus.io/scrape: "true"
spec:
  selector:
    app: device-simulator-mqtt
  ports:
    - name: metrics
      port: 9464
      targetPort: 9464
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-simulator-mqtt
  namespace: iothunter
  labels:
    app: device-simulator-mqtt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: device-simulator-mqtt
  template:
    metadata:
      labels:
        app: device-simulator-mqtt
      annotations:
        prometheus.io/port: "9464"
        prometheus.io/scrape: "true"
    spec:
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        readOnlyRootFilesystem: true
      containers:
        - name: device-simulator-mqtt
          image: device-simulator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9464
              name: metrics
          env:
            - name: Simulator__Protocol
              value: "mqtt"
            - name: Simulator__MqttWebSocketUrl
              value: "ws://mosquitto:8083/mqtt"
            - name: Simulator__DeviceCount
              value: "10"
            - name: Simulator__IntervalMs
              value: "50"
            - name: Simulator__Concurrency
              value: "2"
            - name: Simulator__DurationSeconds
              value: "0"
            - name: Simulator__CriticalEventRatio
              value: "0.03"
            - name: Simulator__ProxyUrl
              value: ""
            - name: ASPNETCORE_URLS
              value: "http://+:9464"
            - name: OpenTelemetry__OtlpEndpoint
              value: "http://otel-collector.iothunter.svc:4317"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "1.0"
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9464
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9464
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
