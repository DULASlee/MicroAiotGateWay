apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: iothunter
type: Opaque
stringData:
  # .NET GetConnectionString("Postgres") 读取 ConnectionStrings:Postgres
  ConnectionStrings__Postgres: "Host=postgres;Database=IoTHunter;Username=iotapp;Password=changeme"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: iothunter
type: Opaque
stringData:
  # .NET GetConnectionString("Redis") 读取 ConnectionStrings:Redis
  ConnectionStrings__Redis: "redis:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secret
  namespace: iothunter
type: Opaque
stringData:
  Kafka__BootstrapServers: "kafka:9092"
